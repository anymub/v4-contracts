[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
bytecode_hash = "none"
cbor_metadata = false
viaIR = true
evm_version = "cancun"
optimizer = true
# Keep runtime code size under EIP-170 (24KB) for ClankerLpLockerFeeConversion.
# Higher runs can exceed max code size on Base and fail deployment.
optimizer_runs = 100


[fmt]
line_length = 100
number_underscore = "thousands"
sort_imports = true
tab_width = 4
